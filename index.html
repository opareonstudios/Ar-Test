<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Smooth MindAR Experience</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<!-- Animation support -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
  body {
    margin: 0;
    overflow: hidden;
  }

  a-scene {
    width: 100vw;
    height: 100vh;
  }
</style>
</head>

<body>

<a-scene
  mindar-image="
    imageTargetSrc: ./targets.mind;
    filterMinCF: 0.0003;
    filterBeta: 0.005;
  "
  renderer="
    antialias: true;
    colorManagement: true;
    precision: mediump;
    logarithmicDepthBuffer: true;
  "
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  embedded
>

  <!-- Assets -->
  <a-assets>
    <a-asset-item id="model" src="./model.glb"></a-asset-item>
  </a-assets>

  <!-- LIGHTWEIGHT CAMERA -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- TARGET ANCHOR -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Smooth 3D model -->
    <a-entity
      gltf-model="#model"
      animation-mixer="clip: *; crossFadeDuration: 0.25; timeScale: 1"
      scale="0.35 0.35 0.35"
      position="0 0 0"
    ></a-entity>

  </a-entity>

</a-scene>

</body>
</html>
